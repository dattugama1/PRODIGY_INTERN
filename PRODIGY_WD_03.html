<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tic-Tac-Toe</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #faf7f2;
    --ink: #1a1410;
    --x: #d63a2f;
    --o: #2563eb;
    --line: #1a1410;
    --surface: #fff;
    --accent: #f5a623;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background: url("data:image/svg+xml,%3Csvg width='20' height='20' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='1' cy='1' r='1' fill='%231a141015'/%3E%3C/svg%3E");
    pointer-events: none;
  }
  h1 {
    font-size: 11px;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: #999;
    margin-bottom: 32px;
    font-family: 'DM Mono', monospace;
  }
  .score-bar {
    display: flex;
    gap: 32px;
    margin-bottom: 32px;
    align-items: center;
  }
  .score-card {
    text-align: center;
    padding: 12px 24px;
    border: 2px solid var(--line);
    border-radius: 12px;
    background: var(--surface);
    min-width: 90px;
    box-shadow: 3px 3px 0 var(--line);
  }
  .score-card.active-x { border-color: var(--x); box-shadow: 3px 3px 0 var(--x); }
  .score-card.active-o { border-color: var(--o); box-shadow: 3px 3px 0 var(--o); }
  .score-label {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    margin-bottom: 4px;
    color: #666;
  }
  .score-val {
    font-size: 32px;
    font-weight: 800;
    line-height: 1;
  }
  .score-val.x { color: var(--x); }
  .score-val.o { color: var(--o); }
  .vs { font-size: 11px; color: #bbb; font-family: 'DM Mono', monospace; }
 
  .board-wrap { position: relative; }
  .board {
    display: grid;
    grid-template-columns: repeat(3, 100px);
    grid-template-rows: repeat(3, 100px);
    gap: 0;
    position: relative;
  }
  .cell {
    width: 100px; height: 100px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    font-size: 44px;
    font-weight: 800;
    border: 2px solid var(--line);
    background: var(--surface);
    transition: background 0.1s;
    position: relative;
    user-select: none;
  }
  .cell:hover:not(.taken) { background: #f0ebe3; }
  .cell.x { color: var(--x); }
  .cell.o { color: var(--o); }
  .cell.win-cell::after {
    content: '';
    position: absolute; inset: 6px;
    background: #f5a62330;
    border: 2px solid var(--accent);
    border-radius: 8px;
  }
 
  .status {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    margin-top: 24px;
    text-align: center;
    min-height: 20px;
    letter-spacing: 0.05em;
  }
  .status .player-x { color: var(--x); font-weight: 500; }
  .status .player-o { color: var(--o); font-weight: 500; }
  .status .winner { font-weight: 700; font-size: 15px; }
 
  .controls {
    display: flex;
    gap: 12px;
    margin-top: 20px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .btn {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 0.05em;
    padding: 10px 20px;
    border: 2px solid var(--line);
    border-radius: 8px;
    cursor: pointer;
    background: var(--surface);
    box-shadow: 2px 2px 0 var(--line);
    transition: all 0.1s;
  }
  .btn:hover { transform: translate(-1px,-1px); box-shadow: 3px 3px 0 var(--line); }
  .btn:active { transform: translate(1px,1px); box-shadow: 1px 1px 0 var(--line); }
  .btn-ai {
    border-color: var(--o); box-shadow: 2px 2px 0 var(--o); color: var(--o);
  }
  .btn-ai.on { background: var(--o); color: #fff; }
  .mode-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: #999;
    margin-top: 8px;
    text-align: center;
  }
</style>
</head>
<body>
<h1>Tic · Tac · Toe</h1>
<div class="score-bar">
  <div class="score-card" id="cardX">
    <div class="score-label">Player X</div>
    <div class="score-val x" id="scoreX">0</div>
  </div>
  <div class="vs">VS</div>
  <div class="score-card" id="cardO">
    <div class="score-label" id="oLabel">Player O</div>
    <div class="score-val o" id="scoreO">0</div>
  </div>
</div>
<div class="board-wrap">
  <div class="board" id="board"></div>
</div>
<div class="status" id="status"></div>
<div class="controls">
  <button class="btn" onclick="newGame()">New Game</button>
  <button class="btn btn-ai" id="aiBtn" onclick="toggleAI()">vs AI</button>
  <button class="btn" onclick="resetScores()">Reset Scores</button>
</div>
<div class="mode-label" id="modeLabel">2 Player Mode</div>
<script>
  let board = Array(9).fill('');
  let current = 'X', gameOver = false;
  let scores = { X: 0, O: 0 };
  let aiMode = false;
  const wins = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
 
  function renderBoard() {
    const el = document.getElementById('board');
    el.innerHTML = '';
    board.forEach((v, i) => {
      const c = document.createElement('div');
      c.className = 'cell' + (v ? ` ${v.toLowerCase()} taken` : '');
      c.textContent = v;
      c.onclick = () => move(i);
      el.appendChild(c);
    });
    highlightActive();
  }
 
  function highlightActive() {
    document.getElementById('cardX').className = 'score-card' + (current==='X' && !gameOver ? ' active-x' : '');
    document.getElementById('cardO').className = 'score-card' + (current==='O' && !gameOver ? ' active-o' : '');
  }
 
  function move(i) {
    if (board[i] || gameOver) return;
    board[i] = current;
    const w = checkWin();
    if (w) {
      scores[current]++;
      document.getElementById('scoreX').textContent = scores.X;
      document.getElementById('scoreO').textContent = scores.O;
      document.getElementById('status').innerHTML =
        `<span class="winner player-${current.toLowerCase()}">Player ${current} wins! 🎉</span>`;
      highlightWin(w);
      gameOver = true;
      return;
    }
    if (board.every(v => v)) {
      document.getElementById('status').innerHTML = `<span>It's a draw!</span>`;
      gameOver = true;
      renderBoard();
      return;
    }
    current = current === 'X' ? 'O' : 'X';
    renderBoard();
    setStatus();
    if (aiMode && current === 'O' && !gameOver) setTimeout(aiMove, 350);
  }
 
  function checkWin() {
    return wins.find(([a,b,c]) => board[a] && board[a]===board[b] && board[b]===board[c]) || null;
  }
 
  function highlightWin(combo) {
    renderBoard();
    combo.forEach(i => document.getElementById('board').children[i].classList.add('win-cell'));
  }
 
  function aiMove() {
    // Minimax
    const best = minimax(board, true);
    move(best.idx);
  }
 
  function minimax(b, isMax, depth=0) {
    const w = wins.find(([a,c,d]) => b[a] && b[a]===b[c] && b[c]===b[d]);
    if (w) return { score: isMax ? -10+depth : 10-depth };
    if (b.every(v => v)) return { score: 0 };
    const moves = b.map((v,i) => v?null:i).filter(v=>v!==null);
    let best = isMax ? { score: -Infinity } : { score: Infinity };
    for (const i of moves) {
      b[i] = isMax ? 'O' : 'X';
      const res = minimax(b, !isMax, depth+1);
      b[i] = '';
      res.idx = i;
      if (isMax ? res.score > best.score : res.score < best.score) best = res;
    }
    return best;
  }
 
  function setStatus() {
    if (gameOver) return;
    const who = aiMode && current==='O' ? 'AI (O)' : `Player ${current}`;
    const cls = current.toLowerCase();
    document.getElementById('status').innerHTML = `<span class="player-${cls}">${who}'s turn</span>`;
  }
 
  function newGame() {
    board = Array(9).fill('');
    current = 'X'; gameOver = false;
    renderBoard(); setStatus();
  }
 
  function toggleAI() {
    aiMode = !aiMode;
    document.getElementById('aiBtn').classList.toggle('on', aiMode);
    document.getElementById('oLabel').textContent = aiMode ? 'AI (O)' : 'Player O';
    document.getElementById('modeLabel').textContent = aiMode ? 'vs AI Mode' : '2 Player Mode';
    newGame();
  }
 
  function resetScores() {
    scores = { X: 0, O: 0 };
    document.getElementById('scoreX').textContent = 0;
    document.getElementById('scoreO').textContent = 0;
    newGame();
  }
 
  newGame();
</script>
</body>
</html>
