<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stopwatch</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@300;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --border: #1e1e2e;
    --accent: #00ffc8;
    --accent2: #ff3e6c;
    --text: #e8e8f0;
    --muted: #4a4a6a;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Barlow Condensed', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background: radial-gradient(ellipse at 50% 0%, #00ffc815 0%, transparent 60%);
    pointer-events: none;
  }
  .title {
    font-size: 13px;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 40px;
  }
  .watch-face {
    width: 340px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 40px 32px 32px;
    box-shadow: 0 0 60px #00ffc810, 0 20px 60px #00000080;
    position: relative;
  }
  .watch-face::before {
    content: '';
    position: absolute; top: 0; left: 50%; transform: translateX(-50%);
    width: 60px; height: 3px;
    background: var(--accent);
    border-radius: 0 0 4px 4px;
    box-shadow: 0 0 12px var(--accent);
  }
  .display {
    font-family: 'Share Tech Mono', monospace;
    font-size: 64px;
    color: var(--accent);
    text-align: center;
    letter-spacing: 2px;
    text-shadow: 0 0 20px #00ffc860;
    line-height: 1;
    margin-bottom: 8px;
  }
  .ms-display {
    font-family: 'Share Tech Mono', monospace;
    font-size: 22px;
    color: var(--muted);
    text-align: center;
    letter-spacing: 4px;
    margin-bottom: 36px;
  }
  .controls {
    display: flex;
    gap: 12px;
    justify-content: center;
    margin-bottom: 28px;
  }
  .btn {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 600;
    font-size: 14px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    border: none;
    border-radius: 10px;
    padding: 13px 22px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-start {
    background: var(--accent);
    color: #000;
    flex: 1;
  }
  .btn-start:hover { filter: brightness(1.15); transform: translateY(-1px); }
  .btn-lap {
    background: var(--border);
    color: var(--text);
    flex: 1;
  }
  .btn-lap:hover { background: #2a2a3e; transform: translateY(-1px); }
  .btn-reset {
    background: transparent;
    color: var(--accent2);
    border: 1px solid var(--accent2);
    flex: 1;
  }
  .btn-reset:hover { background: #ff3e6c15; transform: translateY(-1px); }
  .laps {
    max-height: 160px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .laps::-webkit-scrollbar { width: 3px; }
  .laps::-webkit-scrollbar-track { background: transparent; }
  .laps::-webkit-scrollbar-thumb { background: var(--muted); border-radius: 10px; }
  .lap-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 12px;
    background: var(--bg);
    border-radius: 8px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    animation: fadeIn 0.2s ease;
  }
  .lap-num { color: var(--muted); font-size: 11px; letter-spacing: 0.1em; }
  .lap-time { color: var(--text); }
  .lap-diff { color: var(--accent); font-size: 12px; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: none; } }
  .running .display { animation: pulse 1s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { text-shadow: 0 0 20px #00ffc860; } 50% { text-shadow: 0 0 40px #00ffc8cc; } }
</style>
</head>
<body>
<p class="title">Precision Timer</p>
<div class="watch-face" id="face">
  <div class="display" id="display">00:00</div>
  <div class="ms-display" id="ms">00</div>
  <div class="controls">
    <button class="btn btn-start" id="startBtn" onclick="toggleStart()">Start</button>
    <button class="btn btn-lap" onclick="addLap()">Lap</button>
    <button class="btn btn-reset" onclick="resetTimer()">Reset</button>
  </div>
  <div class="laps" id="laps"></div>
</div>
<script>
  let running = false, startTime = 0, elapsed = 0, rafId = null;
  let lapTimes = [], lastLap = 0;
 
  function pad(n, len=2) { return String(Math.floor(n)).padStart(len, '0'); }
 
  function formatTime(ms) {
    const s = Math.floor(ms / 1000);
    return `${pad(Math.floor(s/60))}:${pad(s%60)}`;
  }
 
  function update() {
    const now = elapsed + (running ? Date.now() - startTime : 0);
    document.getElementById('display').textContent = formatTime(now);
    document.getElementById('ms').textContent = pad(Math.floor((now % 1000) / 10));
    if (running) rafId = requestAnimationFrame(update);
  }
 
  function toggleStart() {
    if (!running) {
      startTime = Date.now();
      running = true;
      document.getElementById('startBtn').textContent = 'Pause';
      document.getElementById('face').classList.add('running');
      rafId = requestAnimationFrame(update);
    } else {
      elapsed += Date.now() - startTime;
      running = false;
      cancelAnimationFrame(rafId);
      document.getElementById('startBtn').textContent = 'Resume';
      document.getElementById('face').classList.remove('running');
    }
  }
 
  function addLap() {
    const now = elapsed + (running ? Date.now() - startTime : 0);
    if (now === 0) return;
    const diff = now - lastLap;
    lapTimes.push({ total: now, diff });
    lastLap = now;
    renderLaps();
  }
 
  function renderLaps() {
    const container = document.getElementById('laps');
    container.innerHTML = '';
    [...lapTimes].reverse().forEach((l, i) => {
      const n = lapTimes.length - i;
      const div = document.createElement('div');
      div.className = 'lap-item';
      div.innerHTML = `<span class="lap-num">LAP ${String(n).padStart(2,'0')}</span>
        <span class="lap-time">${formatTime(l.total)}.${pad(Math.floor((l.total%1000)/10))}</span>
        <span class="lap-diff">+${formatTime(l.diff)}.${pad(Math.floor((l.diff%1000)/10))}</span>`;
      container.appendChild(div);
    });
  }
 
  function resetTimer() {
    running = false;
    cancelAnimationFrame(rafId);
    elapsed = 0; lastLap = 0; lapTimes = [];
    document.getElementById('display').textContent = '00:00';
    document.getElementById('ms').textContent = '00';
    document.getElementById('startBtn').textContent = 'Start';
    document.getElementById('face').classList.remove('running');
    document.getElementById('laps').innerHTML = '';
  }
</script>
</body>
</html>
