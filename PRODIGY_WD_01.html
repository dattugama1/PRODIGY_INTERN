<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Navigation Menu</title>
    <style>
        /* 1. RESET & BASE STYLES */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: sans-serif;
        }

        /* 2. NAVBAR STYLES */
        #navbar {
            position: fixed; /* Keep visible on all pages */
            top: 0;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 25px 8%;
            transition: all 0.4s ease;
            z-index: 10000; /* Ensure it stays on top of content */
            background-color: transparent; /* Initial state */
        }

        /* Changes triggered by scroll */
        #navbar.scrolled {
            background-color: #222 !important; /* Force color change */
            padding: 15px 8%;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .logo {
            color: #fff;
            font-size: 1.5rem;
            font-weight: bold;
        }

        .nav-links {
            display: flex;
            list-style: none;
        }

        .nav-links li {
            margin-left: 25px;
        }

        .nav-links a {
            color: #fff;
            text-decoration: none;
            font-weight: 500;
            transition: 0.3s;
        }

        /* HOVER INTERACTIVITY */
        .nav-links a:hover {
            color: #00d4ff; 
        }

        /* 3. DUMMY CONTENT (Essential to see scroll effect) */
        .hero {
            height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
        }

        .extra-content {
            height: 1000px;
            padding: 100px 8%;
            font-size: 1.2rem;
            line-height: 1.6;
        }
    </style>
</head>
<body>

    <nav id="navbar">
        <div class="logo">MyBrand</div>
        <ul class="nav-links">
            <li><a href="#">Home</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Services</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
    </nav>

    <div class="hero">
        <h1>Scroll Down to Watch the Header Style Change</h1>
    </div>

    <div class="extra-content">
        <h2>Scroll effect active!</h2>
        <p>The navbar background should now be dark because the JavaScript added the "scrolled" class.</p>
    </div>

    <script>
        // 4. JAVASCRIPT SCROLL INTERACTION
        window.addEventListener('scroll', function() {
            const navbar = document.getElementById('navbar');
            // Change color after 60px of scrolling
            if (window.scrollY > 60) {
                navbar.classList.add('scrolled');
            } else {
                navbar.classList.remove('scrolled');
            }
        });
    </script>

</body>
</html>
